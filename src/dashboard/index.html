<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOC Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d10; --panel:#10141a; --panel-2:#0d1117; --line:#1c2229; --line-2:#262e36;
    --txt:#d6dde3; --txt-dim:#7c8893; --txt-faint:#4a535c;
    --green:#4ADE80; --green-dim:#1c3a28;
    --amber:#F0B429; --amber-dim:#3a2e10;
    --red:#EF4444; --red-dim:#3a1414;
    --blue:#3B82F6; --blue-dim:#13243f;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --sans:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--txt); font-family:var(--sans);
    min-height:100vh; font-size:14px;
  }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:2px;}

  .topbar{
    border-bottom:1px solid var(--line); padding:14px 28px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; background:rgba(10,13,16,0.92); backdrop-filter:blur(6px); z-index:20;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:8px; height:8px; background:var(--green); flex-shrink:0;
    box-shadow:0 0 0 3px var(--green-dim);
    animation:blink 2.4s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1} 50%{opacity:.35}}
  .brand h1{font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--txt);}
  .brand-sub{font-family:var(--mono); font-size:11px; color:var(--txt-faint); margin-left:6px;}
  .topbar-right{display:flex; align-items:center; gap:14px;}
  .tabs{display:flex; gap:2px; background:var(--panel); border:1px solid var(--line); border-radius:3px; padding:2px;}
  .tab{
    font-family:var(--mono); font-size:11px; color:var(--txt-faint); padding:5px 12px;
    border-radius:2px; cursor:pointer; letter-spacing:.03em; transition:all .15s;
  }
  .tab:hover{color:var(--txt-dim);}
  .tab.active{background:var(--line-2); color:var(--txt);}
  .view{display:none;}
  .view.active{display:block;}
  .live-pill{
    font-family:var(--mono); font-size:11px; color:var(--txt-dim);
    display:flex; align-items:center; gap:6px; padding:5px 10px;
    border:1px solid var(--line); border-radius:3px;
  }
  .live-pill .led{width:5px; height:5px; border-radius:50%; background:var(--green); animation:blink 1.6s ease-in-out infinite;}
  .btn{
    font-family:var(--mono); font-size:11px; color:var(--txt-dim); background:transparent;
    border:1px solid var(--line); border-radius:3px; padding:6px 12px; cursor:pointer;
    transition:all .15s; letter-spacing:.03em;
  }
  .btn:hover{border-color:var(--line-2); color:var(--txt);}
  select.btn{padding:5px 8px; appearance:none; -webkit-appearance:none; background:var(--panel); color:var(--txt-dim);}
  select.btn option{background:var(--panel); color:var(--txt);}

  .wrap{max-width:1280px; margin:0 auto; padding:24px 28px 60px;}

  .kpi-row{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); margin-bottom:24px;}
  .kpi{background:var(--panel); padding:16px 20px;}
  .kpi-label{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--txt-faint); margin-bottom:10px;}
  .kpi-value{font-family:var(--mono); font-size:30px; font-weight:600; line-height:1; color:var(--txt);}
  .kpi-value.green{color:var(--green);}
  .kpi-value.amber{color:var(--amber);}
  .kpi-value.red{color:var(--red);}
  .kpi-sub{font-size:11px; color:var(--txt-faint); margin-top:6px;}

  .grid-2{display:grid; grid-template-columns:1.3fr 1fr; gap:20px; margin-bottom:20px;}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:4px;}
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 18px; border-bottom:1px solid var(--line);
  }
  .panel-head h2{font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--txt-dim);}
  .panel-head-sub{font-family:var(--mono); font-size:10px; color:var(--txt-faint);}
  .panel-body{padding:18px;}

  .sev-filters{display:flex; gap:6px;}
  .sev-chip{
    font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:3px;
    border:1px solid var(--line); color:var(--txt-faint); cursor:pointer; user-select:none;
    transition:all .15s; letter-spacing:.03em;
  }
  .sev-chip:hover{border-color:var(--line-2);}
  .sev-chip.active{color:var(--bg);}
  .sev-chip.active[data-sev="critical"]{background:var(--red); border-color:var(--red);}
  .sev-chip.active[data-sev="high"]{background:var(--amber); border-color:var(--amber);}
  .sev-chip.active[data-sev="medium"]{background:var(--blue); border-color:var(--blue);}
  .sev-chip.active[data-sev="low"]{background:var(--green); border-color:var(--green);}
  .sev-chip.active[data-sev="all"]{background:var(--txt-dim); border-color:var(--txt-dim);}

  table{width:100%; border-collapse:collapse;}
  thead th{
    font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--txt-faint); text-align:left; padding:0 14px 10px; font-weight:500;
    position:sticky; top:0; background:var(--panel); padding-top:13px; z-index:1;
  }
  tbody tr.action-row{border-top:1px solid var(--line); cursor:pointer; transition:background .1s;}
  tbody tr.action-row:hover{background:var(--panel-2);}
  tbody td{padding:11px 14px; font-size:12.5px; vertical-align:middle;}
  td.mono{font-family:var(--mono); color:var(--txt-dim); font-size:11.5px;}
  .row-incident{font-weight:500; color:var(--txt);}
  .chevron{color:var(--txt-faint); font-family:var(--mono); font-size:11px; transition:transform .15s; display:inline-block;}
  tr.expanded .chevron{transform:rotate(90deg);}
  .detail-row td{padding:0; border-top:none;}
  .detail-inner{
    background:var(--panel-2); border-left:2px solid var(--line-2);
    margin:0 14px 12px; padding:14px 16px; font-size:12.5px; color:var(--txt-dim); line-height:1.6;
    display:none;
  }
  .detail-inner.show{display:block;}
  .detail-inner .lbl{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-faint); margin-bottom:4px; margin-top:10px;}
  .detail-inner .lbl:first-child{margin-top:0;}
  .detail-inner code{font-family:var(--mono); background:var(--bg); padding:1px 6px; border-radius:2px; color:var(--green); font-size:11.5px;}

  .badge{
    font-family:var(--mono); font-size:10px; font-weight:600; padding:2px 8px; border-radius:2px;
    letter-spacing:.03em; display:inline-block;
  }
  .badge-critical{background:var(--red-dim); color:var(--red);}
  .badge-high{background:var(--amber-dim); color:var(--amber);}
  .badge-medium{background:var(--blue-dim); color:var(--blue);}
  .badge-low{background:var(--green-dim); color:var(--green);}
  .badge-simulated{background:var(--amber-dim); color:var(--amber);}
  .badge-executed{background:var(--green-dim); color:var(--green);}
  .badge-flagged{background:var(--red-dim); color:var(--red);}
  .badge-skipped{background:var(--line); color:var(--txt-faint);}
  .badge-unknown{background:var(--line); color:var(--txt-faint);}

  .sev-bars{display:flex; flex-direction:column; gap:14px;}
  .sev-bar-row{display:flex; flex-direction:column; gap:5px;}
  .sev-bar-top{display:flex; align-items:baseline; justify-content:space-between;}
  .sev-bar-label{font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase;}
  .sev-bar-label.critical{color:var(--red);} .sev-bar-label.high{color:var(--amber);}
  .sev-bar-label.medium{color:var(--blue);} .sev-bar-label.low{color:var(--green);}
  .sev-bar-count{font-family:var(--mono); font-size:13px; color:var(--txt); font-weight:600;}
  .sev-bar-pct{font-family:var(--mono); font-size:10.5px; color:var(--txt-faint); margin-left:6px;}
  .sev-bar-track{height:6px; background:var(--panel-2); border-radius:3px; overflow:hidden;}
  .sev-bar-fill{height:100%; border-radius:3px; transition:width .4s ease;}
  .sev-bar-fill.critical{background:var(--red);} .sev-bar-fill.high{background:var(--amber);}
  .sev-bar-fill.medium{background:var(--blue);} .sev-bar-fill.low{background:var(--green);}
  .sev-bar-meta{font-size:10.5px; color:var(--txt-faint); margin-top:1px;}
  .sev-bar-meta code{font-family:var(--mono); color:var(--txt-dim);}
  .sev-empty-note{font-size:11.5px; color:var(--txt-faint); padding:30px 0; text-align:center;}

  .table-scroll{min-height:340px; max-height:340px; overflow-y:auto;}

  .btn.pulsing{border-color:var(--green); color:var(--green);}

  .audit-feed{font-family:var(--mono); font-size:11.5px; line-height:1.9; max-height:420px; overflow-y:auto;}
  .audit-line{display:flex; gap:10px; padding:2px 0;}
  .audit-line .t{color:var(--txt-faint); flex-shrink:0;}
  .audit-line .tag{flex-shrink:0; min-width:64px;}
  .audit-line .tag.warn{color:var(--amber);}
  .audit-line .tag.ok{color:var(--green);}
  .audit-line .tag.err{color:var(--red);}
  .audit-line .tag.info{color:var(--txt-faint);}
  .audit-line .msg{color:var(--txt-dim); word-break:break-word;}
  .audit-line-new{animation:feedIn .5s ease-out;}
  @keyframes feedIn{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);}}

  .fade-in{animation:fadeIn .35s ease-out;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .cursor{display:inline-block; width:7px; height:13px; background:var(--green); animation:blink 1s steps(1) infinite; vertical-align:-2px;}

  .empty{padding:60px 20px; text-align:center; color:var(--txt-faint);}
  .empty .big{font-family:var(--mono); font-size:13px; color:var(--txt-dim); margin-bottom:8px;}
  .empty code{font-family:var(--mono); background:var(--panel-2); border:1px solid var(--line); padding:3px 8px; border-radius:3px; color:var(--green); font-size:11.5px;}

  .legend{display:flex; gap:16px; font-family:var(--mono); font-size:10.5px; color:var(--txt-faint); margin-top:14px; flex-wrap:wrap;}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .legend i{width:8px; height:8px; border-radius:2px; display:inline-block;}

  .exec-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); margin-bottom:20px;}
  .exec-cell{background:var(--panel); padding:14px 18px;}
  .exec-label{font-family:var(--mono); font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--txt-faint); margin-bottom:8px;}
  .exec-val{font-size:14px; font-weight:500; color:var(--txt);}
  .exec-val.mono{font-family:var(--mono);}

  .tl-track{position:relative; padding-left:18px;}
  .tl-track::before{content:''; position:absolute; left:4px; top:4px; bottom:4px; width:1px; background:var(--line-2);}
  .tl-item{position:relative; padding:8px 0 8px 16px;}
  .tl-item::before{content:''; position:absolute; left:-19px; top:13px; width:7px; height:7px; border-radius:50%; background:var(--dot,var(--green)); box-shadow:0 0 0 3px var(--bg);}
  .tl-time{font-family:var(--mono); font-size:11px; color:var(--txt-faint); margin-right:10px;}
  .tl-name{font-size:12.5px; color:var(--txt);}
  .tl-ip{font-family:var(--mono); font-size:11px; color:var(--txt-faint); margin-left:8px;}

  .inc-card{border:1px solid var(--line); border-radius:4px; margin-bottom:12px; overflow:hidden;}
  .inc-head{
    display:flex; align-items:center; justify-content:space-between; padding:13px 16px;
    cursor:pointer; transition:background .1s; border-left:3px solid var(--dot,var(--green));
  }
  .inc-head:hover{background:var(--panel-2);}
  .inc-head-left{display:flex; align-items:center; gap:12px;}
  .inc-name{font-size:13px; font-weight:500; color:var(--txt);}
  .inc-meta{font-family:var(--mono); font-size:11px; color:var(--txt-faint);}
  .inc-body{
    display:none; padding:16px; border-top:1px solid var(--line); background:var(--panel-2);
    font-size:12.5px; line-height:1.7; color:var(--txt-dim);
  }
  .inc-body.show{display:block;}
  .inc-body .lbl{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--txt-faint); margin-bottom:5px; margin-top:14px;}
  .inc-body .lbl:first-child{margin-top:0;}
  .inc-body .action-box{
    background:var(--green-dim); border-left:2px solid var(--green); padding:8px 12px;
    color:var(--green); font-size:12px; margin-top:5px;
  }

  .fb-prior{
    font-size:11.5px; color:var(--txt-dim); background:var(--panel-2); border-radius:4px;
    padding:6px 10px; margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .fb-prior-verdict{font-family:var(--mono); font-size:10px; font-weight:600; padding:1px 7px; border-radius:2px;}
  .fb-prior-verdict.false_positive{background:var(--red-dim); color:var(--red);}
  .fb-prior-verdict.true_positive{background:var(--green-dim); color:var(--green);}
  .fb-actions{display:flex; gap:8px;}
  .fb-btn{
    font-family:var(--mono); font-size:11px; padding:6px 12px; border-radius:3px;
    cursor:pointer; transition:all .15s; letter-spacing:.02em; background:transparent;
  }
  .fb-tp{border:1px solid var(--green-dim); color:var(--green);}
  .fb-tp:hover{background:var(--green-dim);}
  .fb-fp{border:1px solid var(--red-dim); color:var(--red);}
  .fb-fp:hover{background:var(--red-dim);}
  .fb-status{font-size:11.5px; color:var(--txt-faint); margin-top:8px;}
  .fb-saved{font-family:var(--mono); font-size:11px; font-weight:600;}
  .fb-saved.false_positive{color:var(--red);}
  .fb-saved.true_positive{color:var(--green);}

  .rec-row{display:flex; align-items:center; gap:14px; padding:10px 16px; border-top:1px solid var(--line); font-size:12.5px;}
  .rec-row:first-child{border-top:none;}
  .rec-num{font-family:var(--mono); color:var(--txt-faint); width:18px; flex-shrink:0;}
  .rec-for{font-weight:500; color:var(--txt); width:200px; flex-shrink:0;}
  .rec-action{color:var(--txt-dim); flex:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <h1>SOC // Operations</h1>
    <span class="brand-sub" id="report-id">awaiting data</span>
  </div>
  <div class="topbar-right">
    <div class="tabs" id="tabs">
      <span class="tab active" data-tab="ops">operations</span>
      <span class="tab" data-tab="report">incident report</span>
    </div>
    <span class="live-pill"><span class="led"></span><span id="last-updated">auto-refresh</span></span>
    <select class="btn" id="interval-select" onchange="updateInterval()">
      <option value="0">manual only</option>
      <option value="5000">every 5s</option>
      <option value="15000">every 15s</option>
      <option value="30000" selected>every 30s</option>
      <option value="60000">every 60s</option>
    </select>
    <button class="btn" id="refresh-btn" onclick="refreshAll()">↻ refresh</button>
    <button class="btn" id="clear-btn" onclick="clearOutput()" style="color:var(--red); border-color:var(--red-dim);">⊘ clear output</button>
  </div>
</div>

<div class="wrap">
  <div class="view active" id="view-ops">
    <div class="empty">
      <div class="big">connecting to pipeline output…</div>
    </div>
  </div>
  <div class="view" id="view-report">
    <div class="empty">
      <div class="big">connecting to pipeline output…</div>
    </div>
  </div>
</div>

<script>
let activeFilter = 'all';
let lastActions = [];
let wasCleared = false;

function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function fmtTime(ts){
  if(!ts) return '--:--:--';
  const d = new Date(ts);
  if(isNaN(d)) return (ts+'').slice(11,19) || ts;
  return d.toTimeString().slice(0,8);
}

function badgeClass(label){
  const k = (label||'unknown').toLowerCase();
  return ['critical','high','medium','low','simulated','executed','flagged','skipped'].includes(k) ? k : 'unknown';
}

function badge(label){
  const cls = badgeClass(label);
  return `<span class="badge badge-${cls}">${esc((label||'unknown').toUpperCase())}</span>`;
}

async function fetchJSON(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error('fetch failed: '+url);
  return r.json();
}

function renderShell(){
  document.getElementById('view-ops').innerHTML = `
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Total actions</div>
        <div class="kpi-value" id="k-total">0</div>
        <div class="kpi-sub">across all incidents</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Simulated</div>
        <div class="kpi-value amber" id="k-sim">0</div>
        <div class="kpi-sub">firewall / VLAN rules</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Executed (real)</div>
        <div class="kpi-value green" id="k-exec">0</div>
        <div class="kpi-sub">notifications dispatched</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Flagged for review</div>
        <div class="kpi-value red" id="k-flag">0</div>
        <div class="kpi-sub">no automated handler</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head">
          <h2>Severity breakdown</h2>
          <span class="panel-head-sub" id="sev-total-sub">0 actions</span>
        </div>
        <div class="panel-body">
          <div class="sev-bars" id="sev-bars"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Live audit feed</h2>
          <span class="panel-head-sub" id="audit-count-sub">last 50 events</span>
        </div>
        <div class="panel-body">
          <div class="audit-feed" id="audit-feed"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Executed incidents &amp; mitigations</h2>
        <div class="sev-filters" id="sev-filters">
          <span class="sev-chip active" data-sev="all">ALL</span>
          <span class="sev-chip" data-sev="critical">CRIT</span>
          <span class="sev-chip" data-sev="high">HIGH</span>
          <span class="sev-chip" data-sev="medium">MED</span>
          <span class="sev-chip" data-sev="low">LOW</span>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:18px;"></th>
              <th>Incident</th>
              <th>Action</th>
              <th>Severity</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="action-rows"></tbody>
        </table>
      </div>
    </div>
  `;

  document.querySelectorAll('.sev-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeFilter = chip.dataset.sev;
      document.querySelectorAll('.sev-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderActions();
    });
  });
}

function renderSeverityBars(sevData, actions){
  const el = document.getElementById('sev-bars');
  const labels = ['critical','high','medium','low'];
  const total = sevData.reduce((a,b)=>a+b,0);

  if(total === 0){
    el.innerHTML = `<div class="sev-empty-note">no actions recorded yet</div>`;
    return;
  }

  el.innerHTML = labels.map((sev, i) => {
    const count = sevData[i];
    const pct = total ? Math.round((count/total)*100) : 0;
    // find the most common incident name at this severity for context
    const atSev = actions.filter(a => (a.severity||'').toLowerCase() === sev);
    const sample = atSev[0];
    const metaText = sample
      ? `most recent: <code>${esc(sample.incident_id || sample.incident || '—')}</code> — ${esc((sample.action||'').replace(/_/g,' '))}`
      : 'none recorded';
    return `
      <div class="sev-bar-row" data-sev="${sev}" style="cursor:pointer;">
        <div class="sev-bar-top">
          <span class="sev-bar-label ${sev}">${sev}</span>
          <span><span class="sev-bar-count">${count}</span><span class="sev-bar-pct">${pct}%</span></span>
        </div>
        <div class="sev-bar-track"><div class="sev-bar-fill ${sev}" style="width:${pct}%"></div></div>
        <div class="sev-bar-meta">${metaText}</div>
      </div>`;
  }).join('');

  document.querySelectorAll('.sev-bar-row').forEach(row => {
    row.addEventListener('click', () => {
      const sev = row.dataset.sev;
      const chip = document.querySelector(`.sev-chip[data-sev="${sev}"]`);
      if(chip) chip.click();
    });
  });
}

function renderActions(){
  const tbody = document.getElementById('action-rows');
  const filtered = activeFilter === 'all'
    ? lastActions
    : lastActions.filter(a => (a.severity||'').toLowerCase() === activeFilter);

  if(!filtered.length){
    tbody.innerHTML = `<tr><td colspan="6" style="padding:30px; text-align:center; color:var(--txt-faint); font-family:var(--mono); font-size:12px;">no actions match this filter</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map((a, i) => {
    const sev = (a.severity||'low').toLowerCase();
    const status = (a.status||'unknown');
    const inc = a.incident_id || a.incident || 'N/A';
    const desc = a.description || a.command || a.action || '';
    return `
      <tr class="action-row" data-idx="${i}">
        <td class="chevron">&#9656;</td>
        <td class="mono row-incident">${esc(inc)}</td>
        <td>${esc(a.action || 'N/A')}</td>
        <td>${badge(sev)}</td>
        <td>${badge(status)}</td>
        <td class="mono">${fmtTime(a.timestamp)}</td>
      </tr>
      <tr class="detail-row"><td colspan="6">
        <div class="detail-inner" id="detail-${i}">
          <div class="lbl">Description</div>
          <div>${esc(desc) || '&mdash;'}</div>
          ${a.command ? `<div class="lbl">Command</div><div><code>${esc(a.command)}</code></div>` : ''}
          ${a.target_ip ? `<div class="lbl">Target IP</div><div><code>${esc(a.target_ip)}</code></div>` : ''}
          ${a.recommendation ? `<div class="lbl">Recommendation</div><div>${esc(a.recommendation)}</div>` : ''}
        </div>
      </td></tr>
    `;
  }).join('');

  document.querySelectorAll('.action-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = row.dataset.idx;
      const detail = document.getElementById('detail-'+idx);
      const isOpen = detail.classList.contains('show');
      document.querySelectorAll('.detail-inner.show').forEach(d => d.classList.remove('show'));
      document.querySelectorAll('tr.expanded').forEach(r => r.classList.remove('expanded'));
      if(!isOpen){
        detail.classList.add('show');
        row.classList.add('expanded');
      }
    });
  });
}

function classifyAuditTag(entry){
  const ev = (entry.event||'').toLowerCase();
  const status = (entry.status||'').toLowerCase();
  if(status === 'flagged' || ev.includes('fail')) return ['ERROR','err'];
  if(status === 'simulated' || ev.includes('recommend')) return ['WARN','warn'];
  if(status === 'executed' || ev.includes('complete') || ev.includes('notif')) return ['OK','ok'];
  return ['INFO','info'];
}

function renderAudit(entries, hasNew){
  const el = document.getElementById('audit-feed');
  if(!entries.length){
    el.innerHTML = `<div style="color:var(--txt-faint); padding:20px 0;">no audit entries yet — run the pipeline<span class="cursor"></span></div>`;
    return;
  }
  const shown = entries.slice(0, 50);
  const rows = shown.map((e, i) => {
    const [tag, cls] = classifyAuditTag(e);
    const msg = e.raw || e.description || e.action || e.event || JSON.stringify(e);
    const incident = e.incident ? `${esc(e.incident)}: ` : '';
    // Only the newest entries (those above the previously-known count) get the
    // fade-in treatment — older entries render instantly so we don't replay
    // the whole feed every poll.
    const isNew = hasNew && i < (shown.length - lastAuditCount);
    const fadeClass = isNew ? 'audit-line-new' : '';
    return `<div class="audit-line ${fadeClass}"><span class="t">${fmtTime(e.timestamp)}</span><span class="tag ${cls}">[${tag}]</span><span class="msg">${incident}${esc(msg)}</span></div>`;
  }).join('');
  el.innerHTML = rows + `<div class="audit-line"><span class="t">${fmtTime(new Date().toISOString())}</span><span class="tag info">[IDLE]</span><span class="msg">listening for next event<span class="cursor"></span></span></div>`;
}

let lastAuditCount = 0;

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  btn?.classList.add('pulsing');

  // Snapshot wasCleared before any async ops — both branches need the same value
  const justCleared = wasCleared;

  try{
    const summary = await fetchJSON('/api/summary');
    const audit = await fetchJSON('/api/audit').catch(() => []);

    // If the shell was replaced by an error state, rebuild it
    if(!document.getElementById('k-total')) renderShell();

    // First successful data load after a clear — fade the ops view in
    if(justCleared){
      const opsView = document.getElementById('view-ops');
      opsView.classList.remove('fade-in');
      void opsView.offsetWidth;
      opsView.classList.add('fade-in');
    }

    wasCleared = false;

    document.getElementById('report-id').textContent = `${summary.total_actions || 0} actions logged`;
    document.getElementById('k-total').textContent = summary.total_actions ?? 0;
    document.getElementById('k-sim').textContent = summary.simulated ?? 0;
    document.getElementById('k-exec').textContent = summary.executed ?? 0;
    document.getElementById('k-flag').textContent = summary.flagged ?? 0;

    const sevData = [summary.critical||0, summary.high||0, summary.medium||0, summary.low||0];
    lastActions = summary.actions || [];
    renderSeverityBars(sevData, lastActions);
    document.getElementById('sev-total-sub').textContent = `${sevData.reduce((a,b)=>a+b,0)} actions`;

    renderActions();

    const newCount = (audit || []).length;
    const hasNew = newCount !== lastAuditCount;
    lastAuditCount = newCount;
    renderAudit(audit || [], hasNew);
    document.getElementById('audit-count-sub').textContent = `last ${Math.min(newCount,50)} events`;

    setLastUpdated(true);
  }catch(e){
    // Only replace the shell with the error message on genuine first load.
    // After an intentional clear (justCleared), keep the empty shell visible.
    if(!justCleared){
      document.getElementById('view-ops').innerHTML = `
        <div class="empty">
          <div class="big">no pipeline output found</div>
          <p style="margin-top:6px; font-size:12px;">run the pipeline first:</p>
          <p style="margin-top:8px;"><code>docker exec soc-app python src/main.py --run</code></p>
        </div>`;
    }
    setLastUpdated(false);
  }

  try{
    const report = await fetchJSON('/api/report');
    renderReport(report);
    // Fade the report view in on first load after a clear
    if(justCleared){
      const rv = document.getElementById('view-report');
      rv.classList.remove('fade-in');
      void rv.offsetWidth;
      rv.classList.add('fade-in');
    }
  }catch(e){
    // Same logic — preserve the "output cleared" shell after an intentional clear.
    // Only show the error message on genuine first load with no data.
    if(!justCleared){
      document.getElementById('view-report').innerHTML = `
        <div class="empty">
          <div class="big">no incident report found</div>
          <p style="margin-top:6px; font-size:12px;">run the pipeline first, then refresh:</p>
          <p style="margin-top:8px;"><code>docker exec soc-app python src/main.py --run</code></p>
        </div>`;
    }
  }

  setTimeout(() => btn?.classList.remove('pulsing'), 400);
}

function setLastUpdated(ok){
  const el = document.getElementById('last-updated');
  if(!el) return;
  const now = new Date();
  const t = now.toTimeString().slice(0,8);
  el.textContent = ok ? `updated ${t}` : `no data — ${t}`;
}

function sevDotColor(sev){
  return {critical:'#EF4444', high:'#F0B429', medium:'#3B82F6', low:'#4ADE80'}[(sev||'low').toLowerCase()] || '#4ADE80';
}

let currentIncidents = [];

function renderFeedbackBlock(inc, idx){
  // Adaptive learning UI (pawn-test). Lets an analyst mark a confirmed
  // incident as a true or false positive — stored via POST /api/feedback
  // into the analyst_feedback ChromaDB collection, which the Analyzer
  // queries on every subsequent run.
  const existing = inc.analyst_feedback && inc.analyst_feedback.length
    ? inc.analyst_feedback[0] : null;

  const priorNote = existing
    ? `<div class="fb-prior">Similar past incident reviewed: <span class="fb-prior-verdict ${existing.verdict}">${existing.verdict === 'false_positive' ? 'FALSE POSITIVE' : 'TRUE POSITIVE'}</span></div>`
    : '';

  return `
    <div class="lbl">Adaptive learning feedback</div>
    ${priorNote}
    <div class="fb-actions" id="fb-actions-${idx}">
      <button class="fb-btn fb-tp" onclick="submitFeedback(${idx}, 'true_positive')">&#10003; confirm true positive</button>
      <button class="fb-btn fb-fp" onclick="submitFeedback(${idx}, 'false_positive')">&#10005; mark false positive</button>
    </div>
    <div class="fb-status" id="fb-status-${idx}"></div>
  `;
}

async function submitFeedback(idx, verdict){
  const inc = currentIncidents[idx];
  if(!inc) return;

  const statusEl = document.getElementById(`fb-status-${idx}`);
  const actionsEl = document.getElementById(`fb-actions-${idx}`);
  statusEl.textContent = 'saving...';

  try{
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        incident_id: inc.incident_id,
        combined_summary: inc.combined_summary || `${inc.event_type||''} from ${inc.source_ip||'unknown'}: ${inc.explanation||''}`,
        attack_name: inc.attack_name || inc.event_type || 'unknown',
        mitre_technique_id: inc.mitre_technique_id || 'unknown',
        verdict: verdict,
      }),
    });
    if(!res.ok) throw new Error('save failed');

    actionsEl.style.display = 'none';
    statusEl.innerHTML = `<span class="fb-saved ${verdict}">${verdict === 'false_positive' ? '\u2715 marked false positive' : '\u2713 confirmed true positive'}</span> — will inform future analysis`;
    refreshFeedbackCount();
  }catch(e){
    statusEl.textContent = 'failed to save — try again';
  }
}

function renderReport(report){
  const es   = report.executive_summary || {};
  const incs = report.incidents || [];
  const tl   = report.timeline || [];
  const recs = report.recommendations || [];

  currentIncidents = incs;

  const tlHtml = tl.length ? tl.slice(0, 20).map(e => `
    <div class="tl-item" style="--dot:${sevDotColor(e.severity)}">
      <span class="tl-time">${fmtTime(e.timestamp)}</span>
      <span class="tl-name">${esc(e.attack_name || e.event_type || '—')}</span>
      <span class="tl-ip">${esc(e.source_ip||'')}</span>
    </div>`).join('') : `<div style="color:var(--txt-faint); font-size:12px; padding:8px 0;">no timeline events</div>`;

  const incHtml = incs.length ? incs.map((inc, i) => `
    <div class="inc-card">
      <div class="inc-head" style="--dot:${sevDotColor(inc.threat_level)}" data-inc="${i}">
        <div class="inc-head-left">
          <span class="chevron">&#9656;</span>
          <span class="inc-name">${esc(inc.attack_name || inc.event_type || 'Unknown attack')}</span>
        </div>
        <div class="inc-head-left">
          <span class="inc-meta">${esc(inc.mitre_technique_id||'')}</span>
          <span class="inc-meta">${esc(inc.source_ip||'unknown')}</span>
          ${badge(inc.threat_level)}
        </div>
      </div>
      <div class="inc-body" id="inc-body-${i}">
        <div class="lbl">MITRE technique</div>
        <div>${esc(inc.mitre_technique_id||'—')} &mdash; ${esc(inc.mitre_technique_name||'unknown')}</div>
        <div class="lbl">Confidence</div>
        <div>${esc((inc.confidence||'unknown').toUpperCase())}</div>
        <div class="lbl">Analyst narrative</div>
        <div>${esc(inc.narrative || inc.explanation || 'No narrative available.')}</div>
        <div class="lbl">Recommended action</div>
        <div class="action-box">${esc(inc.recommended_action || 'Manual investigation required.')}</div>
        ${renderFeedbackBlock(inc, i)}
      </div>
    </div>`).join('') : `<div style="color:var(--txt-faint); font-size:12px;">no confirmed incidents</div>`;

  const recHtml = recs.length ? recs.map(r => `
    <div class="rec-row">
      <span class="rec-num">${esc(r.priority)}</span>
      <span class="rec-for">${esc(r.for||'—')}</span>
      ${badge(r.severity)}
      <span class="rec-action">${esc(r.action||'—')}</span>
    </div>`).join('') : `<div style="color:var(--txt-faint); font-size:12px; padding:14px 16px;">no recommendations</div>`;

  document.getElementById('view-report').innerHTML = `
    <div class="exec-grid" style="grid-template-columns:repeat(5,1fr);">
      <div class="exec-cell">
        <div class="exec-label">Threat level</div>
        <div class="exec-val">${badge(es.threat_level)}</div>
      </div>
      <div class="exec-cell">
        <div class="exec-label">Confirmed attacks</div>
        <div class="exec-val mono">${esc(es.confirmed_attacks ?? 0)}</div>
      </div>
      <div class="exec-cell">
        <div class="exec-label">Critical / high</div>
        <div class="exec-val mono">${esc(es.critical_count ?? 0)} / ${esc(es.high_count ?? 0)}</div>
      </div>
      <div class="exec-cell">
        <div class="exec-label">Top attacker</div>
        <div class="exec-val mono">${esc(es.top_source_ip||'unknown')}</div>
      </div>
      <div class="exec-cell">
        <div class="exec-label">Analyst feedback</div>
        <div class="exec-val mono" id="fb-count">&hellip;</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h2>Confirmed incidents</h2><span class="panel-head-sub">${incs.length} total</span></div>
        <div class="panel-body">${incHtml}</div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Attack timeline</h2><span class="panel-head-sub">${tl.length} events</span></div>
        <div class="panel-body"><div class="tl-track">${tlHtml}</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Prioritized recommendations</h2></div>
      ${recHtml}
    </div>
  `;

  document.querySelectorAll('.inc-head').forEach(head => {
    head.addEventListener('click', () => {
      const idx = head.dataset.inc;
      const body = document.getElementById('inc-body-'+idx);
      const isOpen = body.classList.contains('show');
      document.querySelectorAll('.inc-body.show').forEach(b => b.classList.remove('show'));
      document.querySelectorAll('.inc-head .chevron').forEach(c => c.style.transform = '');
      if(!isOpen){
        body.classList.add('show');
        head.querySelector('.chevron').style.transform = 'rotate(90deg)';
      }
    });
  });

  refreshFeedbackCount();
}

async function refreshFeedbackCount(){
  const el = document.getElementById('fb-count');
  if(!el) return;
  try{
    const r = await fetchJSON('/api/feedback/count');
    el.textContent = r.count ?? 0;
  }catch(e){
    el.textContent = '0';
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.tab).classList.add('active');
  });
});

renderShell();
refreshAll();

let _intervalHandle = null;

function updateInterval(){
  const sel = document.getElementById('interval-select');
  const ms = parseInt(sel.value, 10);
  if(_intervalHandle){ clearInterval(_intervalHandle); _intervalHandle = null; }
  if(ms > 0){ _intervalHandle = setInterval(refreshAll, ms); }
  const el = document.getElementById('last-updated');
  if(el && ms === 0) el.textContent = 'manual refresh';
}

async function clearOutput(){
  const btn = document.getElementById('clear-btn');
  btn.textContent = 'clearing...';
  try{
    const r = await fetch('/api/clear', {method:'DELETE'});
    if(!r.ok) throw new Error('clear failed');

    // Reset state
    lastActions = [];
    lastAuditCount = 0;
    wasCleared = true;

    // Rebuild the ops shell from scratch so all element IDs exist again
    // and refreshAll() can update them normally on the next poll/click
    renderShell();

    // Reset the report tab to its empty state
    document.getElementById('view-report').innerHTML = `
      <div class="empty">
        <div class="big">output cleared</div>
        <p style="margin-top:6px; font-size:12px;">run the pipeline to generate a new report</p>
      </div>`;

    document.getElementById('report-id').textContent = 'output cleared';
    setLastUpdated(true);

    // Re-arm the interval
    updateInterval();
    // Switch to ops tab so the empty shell is immediately visible
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelector('.tab[data-tab="ops"]').classList.add('active');
    document.getElementById('view-ops').classList.add('active');

  }catch(e){
    alert('Clear failed — check the dashboard container logs.');
  }
  btn.textContent = '\u2298 clear output';
}

// Start with the default selected interval (30s)
updateInterval();
</script>
</body>
</html>
