services:
  ollama:
    image: ollama/ollama
    container_name: soc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  app:
    build: .
    container_name: soc-app
    volumes:
      - ./src:/app/src
      - onnx-cache:/root/.cache/chroma
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=soc-chroma
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: soc-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

  soc-dashboard:
    build:
      context: ./src/dashboard
    container_name: soc-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - onnx-cache:/root/.cache/chroma
    depends_on:
      - app
    restart: unless-stopped

volumes:
  ollama-models:
  chroma-data:
  onnx-cache: