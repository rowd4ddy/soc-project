services:
  ollama:
    image: ollama/ollama
    container_name: soc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  app:
    build: .
    container_name: soc-app
    volumes:
      - ./src:/app/src
      - onnx-cache:/root/.cache/chroma
      - victim-logs:/victim-logs:ro                      # sandbox: Extractor reads victim logs
      - /var/run/docker.sock:/var/run/docker.sock        # sandbox: Executor runs real actions
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=soc-chroma
      - VICTIM_CONTAINER=soc-victim
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: soc-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

  soc-dashboard:
    build:
      context: ./src/dashboard
    container_name: soc-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - onnx-cache:/root/.cache/chroma
    environment:
      - CHROMA_HOST=soc-chroma
    depends_on:
      - app
    restart: unless-stopped

  # ── ELK Integration (optional bonus) ───────────────────────────────────────
  # Only starts when explicitly requested — never affects the baseline:
  #   docker compose --profile elk up -d
  #
  # After starting, ingest logs once:
  #   docker exec soc-app python src/rag/elk_ingest.py
  #
  # Then run the pipeline in ELK mode:
  #   docker exec -e ELK_MODE=true soc-app python src/main.py --run
  #
  # To stop ELK without touching anything else:
  #   docker compose --profile elk down
  #   (baseline containers keep running)
  soc-elasticsearch:
    image: elasticsearch:8.13.0
    container_name: soc-elasticsearch
    profiles:
      - elk
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  soc-kibana:
    image: kibana:8.13.0
    container_name: soc-kibana
    profiles:
      - elk
    environment:
      - ELASTICSEARCH_HOSTS=http://soc-elasticsearch:9200
      - TELEMETRY_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      soc-elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── Sandbox profile (live victim + attacker) ────────────────────────────────
  # Only starts when explicitly requested:
  #   docker compose --profile sandbox up -d
  #
  # Run the pipeline in live mode against the victim:
  #   docker exec -e LIVE_MODE=true -e EXECUTOR_LIVE_MODE=true soc-app python src/main.py --run
  #
  # Trigger attacks on demand for the demo:
  #   docker exec soc-attacker python3 -c "import generate_traffic as g; g.ssh_brute_force()"
  #
  # ELK + sandbox combined (Kibana shows live attack traffic):
  #   docker compose --profile elk --profile sandbox up -d
  soc-victim:
    build:
      context: ./src/sandbox/victim
    container_name: soc-victim
    hostname: victim
    profiles:
      - sandbox
    cap_add:
      - NET_ADMIN       # lets Agent 4 run real iptables rules inside this container
    volumes:
      - victim-logs:/var/log    # shared with soc-app (read) and shipper (read)
    restart: unless-stopped

  soc-attacker:
    build:
      context: ./src/sandbox/attacker
    container_name: soc-attacker
    profiles:
      - sandbox
    environment:
      - VICTIM_HOST=soc-victim
      - SLEEP_SECONDS=90
    depends_on:
      - soc-victim
    restart: unless-stopped

  # ── ELK live shipper (sandbox + elk combined) ───────────────────────────────
  # Tails the victim's live logs and ships new lines to Elasticsearch in
  # real time so Kibana shows live attack traffic as it happens.
  # Only meaningful when both profiles are active:
  #   docker compose --profile elk --profile sandbox up -d
  soc-log-shipper:
    build: .
    container_name: soc-log-shipper
    profiles:
      - sandbox
    volumes:
      - ./src:/app/src
      - victim-logs:/victim-logs:ro    # reads victim logs
    environment:
      - ES_HOST=http://soc-elasticsearch:9200
      - ES_INDEX=soc-logs-live
      - SHIP_INTERVAL=3
    command: ["python", "-u", "src/rag/elk_live_shipper.py"]
    restart: unless-stopped

volumes:
  ollama-models:
  chroma-data:
  onnx-cache:
  es-data:
  victim-logs:    # shared between soc-victim (write) and soc-app/soc-log-shipper (read)